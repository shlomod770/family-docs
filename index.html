<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>מסמכי משפחה</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F2F2F7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="מסמכי משפחה">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F3F4F7; --card:#FFFFFF; --navy:#16223F; --blue:#2E5AAC; --blue-deep:#1E3E7A;
  --gold:#B4862F; --green:#1E9166; --orange:#C9791A; --red:#C0392B; --purple:#7C5CBF;
  --label:#16223F; --label2:rgba(22,34,63,0.78); --label3:#707A8C;
  --sep:rgba(22,34,63,0.09); --fill:rgba(22,34,63,0.05); --fill2:rgba(22,34,63,0.12);
  --shadow:0 1px 2px rgba(22,34,63,0.04),0 8px 24px rgba(22,34,63,0.07);
  --shadow-sm:0 1px 2px rgba(22,34,63,0.05),0 2px 8px rgba(22,34,63,0.05);
  --r:16px; --r-lg:22px;
  --font:'Heebo',-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);font-family:var(--font);color:var(--label);direction:rtl;height:100%;-webkit-font-smoothing:antialiased;}
#app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:78px;}
.hidden{display:none !important;}
.top-header{padding:20px 18px 8px;position:sticky;top:0;background:var(--bg);z-index:5;}
.top-header h1{font-size:27px;font-weight:800;margin:0;letter-spacing:-0.01em;color:var(--navy);}
.search-wrap{padding:4px 16px 8px;}
.search-input{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--sep);background:var(--card);font-size:15px;font-family:var(--font);}
.pills{display:flex;gap:10px;padding:6px 16px 14px;}
.pill{flex:1;background:var(--card);border-radius:16px;box-shadow:var(--shadow-sm);border:1px solid var(--sep);padding:14px 8px 12px;text-align:center;position:relative;overflow:hidden;}
.pill:before{content:"";position:absolute;top:0;right:0;left:0;height:3px;background:var(--fill2);}
.pill.r:before{background:var(--red);} .pill.o:before{background:var(--orange);} .pill.g:before{background:var(--green);}
.pill-num{font-size:23px;font-weight:800;line-height:1;letter-spacing:-0.02em;}
.pill-lbl{font-size:10.5px;color:var(--label3);margin-top:5px;font-weight:600;letter-spacing:0.01em;}
.pill-num.r{color:var(--red)} .pill-num.o{color:var(--orange)} .pill-num.g{color:var(--green)} .pill-num.gr{color:var(--label3)}
.chips{display:flex;gap:8px;padding:6px 16px 6px;overflow-x:auto;}
.chip{padding:7px 16px;border-radius:20px;border:1px solid var(--sep);background:var(--card);color:var(--label2);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .18s;font-family:var(--font);}
.chip.on{background:var(--navy);color:#FFF;border-color:var(--navy);}
.filter-bar-btn{padding:6px 16px;}
.filter-bar-btn button{background:none;border:none;color:var(--blue);font-size:13px;font-weight:700;font-family:var(--font);}
.list{padding:8px 16px 16px;}
.doc-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);border:1px solid var(--sep);margin-bottom:11px;overflow:hidden;cursor:pointer;transition:transform .14s, box-shadow .14s;}
.doc-card:active{transform:scale(.975);}
.strip{height:3px;}
.strip.ok{background:var(--green);} .strip.warning{background:var(--orange);} .strip.warn2{background:#B08A00;} .strip.critical{background:var(--red);} .strip.expired{background:var(--label3);}
.doc-body{display:flex;align-items:center;padding:14px 16px;gap:13px;}
.doc-em{font-size:30px;flex-shrink:0;}
.doc-info{flex:1;min-width:0;}
.doc-name{font-size:16px;font-weight:700;color:var(--navy);}
.doc-type{font-size:13px;color:var(--label3);margin-top:2px;}
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.b-red{background:rgba(192,57,43,.1);color:var(--red);} .b-orange{background:rgba(201,121,26,.1);color:var(--orange);}
.b-yellow{background:rgba(176,138,0,.1);color:#8a6d00;} .b-green{background:rgba(30,145,102,.1);color:var(--green);} .b-gray{background:var(--fill);color:var(--label3);}
.empty-state{text-align:center;color:var(--label3);padding:60px 20px;font-size:14px;}
.fab{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--blue) 0%,var(--blue-deep) 100%);color:#fff;font-size:26px;border:none;
  box-shadow:0 6px 18px rgba(30,62,122,.35);cursor:pointer;position:absolute;bottom:78px;left:16px;
  display:flex;align-items:center;justify-content:center;padding:0;line-height:1;}
.bottom-wrap{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;z-index:20;pointer-events:none;}
.bottom-inner{max-width:520px;width:100%;position:relative;pointer-events:none;}
.bottom-inner > *{pointer-events:auto;}
.tabbar{position:static;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);
  border-top:1px solid var(--sep);display:flex;padding:6px 0 max(6px,env(safe-area-inset-bottom));}
.tab-item{flex:1;text-align:center;background:none;border:none;color:var(--label3);font-family:var(--font);cursor:pointer;padding:4px;transition:color .15s;}
.tab-item.active{color:var(--blue-deep);}
.tab-icon{font-size:21px;display:block;}
.tab-lbl{font-size:10px;margin-top:2px;font-weight:600;}
.av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--blue) 0%,var(--navy) 100%);display:flex;align-items:center;justify-content:center;color:#FFF;font-size:16px;font-weight:700;flex-shrink:0;}
.fam-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);border:1px solid var(--sep);margin-bottom:11px;padding:14px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;}
.fam-name{font-size:16px;font-weight:700;color:var(--navy);}
.fam-rel{font-size:13px;color:var(--label3);}
.settings-group{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);border:1px solid var(--sep);margin:0 16px 16px;overflow:hidden;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--sep);}
.settings-row:last-child{border-bottom:none;}
.settings-row label{font-size:15px;}
.settings-title{font-size:12.5px;color:var(--label3);margin:20px 16px 7px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
input[type=text],input[type=password],input[type=email],input[type=date],input[type=number],select,textarea{
  width:100%;padding:11px 12px;border-radius:11px;border:1px solid var(--sep);background:var(--card);font-size:15px;font-family:var(--font);color:var(--label);}
input:focus,textarea:focus,select:focus{outline:2px solid var(--blue);outline-offset:1px;}
textarea{resize:vertical;min-height:60px;}
.field{margin-bottom:14px;}
.field-label{font-size:13px;color:var(--label3);margin-bottom:5px;display:block;font-weight:600;}
.btn{display:block;width:100%;padding:14px;border-radius:13px;border:none;font-size:15.5px;font-weight:700;font-family:var(--font);cursor:pointer;margin-bottom:10px;letter-spacing:0.01em;}
.btn-blue{background:var(--blue-deep);color:#FFF;} .btn-red{background:rgba(192,57,43,.1);color:var(--red);}
.btn-gray{background:var(--fill);color:var(--label);} .btn-green{background:rgba(30,145,102,.1);color:var(--green);}
.btn:active, button:active{transform:scale(.97);opacity:.85;transition:transform .08s, opacity .08s;}
.sheet-overlay{position:fixed;inset:0;background:rgba(16,24,44,.45);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.sheet{background:var(--bg);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;border-radius:22px 22px 0 0;padding:16px;animation:slideup .22s ease-out;}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sheet-header h2{font-size:19px;margin:0;font-weight:800;color:var(--navy);}
.sheet-close{background:var(--fill);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;color:var(--label3);}
.checkbox-row{display:flex;align-items:center;gap:8px;padding:8px 0;}
.thumb-preview{max-width:100%;border-radius:12px;margin:8px 0;}
#lock-screen{position:fixed;inset:0;background:linear-gradient(160deg,var(--navy) 0%,#0E1830 100%);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#lock-screen .lock-title{color:#FFF;}
#lock-screen .lock-sub{color:rgba(255,255,255,.65);}
#lock-screen .longcode-box, #lock-screen input{color:var(--label);}
.pin-dots{display:flex;gap:16px;margin:26px 0;}
.pin-dot{width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.18);}
.pin-dot.filled{background:var(--gold);}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:16px;direction:ltr;}
.pin-key{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.08);color:#FFF;box-shadow:none;border:1px solid rgba(255,255,255,.12);font-size:24px;font-family:var(--font);font-weight:600;cursor:pointer;}
.pin-key:active{background:rgba(255,255,255,.16);}
.lock-title{font-size:21px;font-weight:800;margin-bottom:6px;letter-spacing:-0.01em;}
.lock-sub{font-size:13px;color:var(--label3);text-align:center;max-width:280px;}
.longcode-box{width:100%;max-width:320px;}
.longcode-warning{background:rgba(201,121,26,.12);color:#8a5000;padding:10px 14px;border-radius:12px;font-size:13px;margin-bottom:14px;line-height:1.6;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 22px;border-radius:20px;font-size:14px;z-index:200;box-shadow:0 6px 18px rgba(0,0,0,.25);}
.chip-cat{font-size:11px;color:var(--label3);margin:4px 16px 0;}
.doc-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.doc-icon svg{width:22px;height:22px;}
.date-field{display:flex;gap:8px;align-items:center;}
.date-field input[type=text]{flex:1;}
.date-cal-btn{width:42px;height:42px;flex-shrink:0;border-radius:10px;border:1px solid var(--sep);background:var(--card);font-size:18px;cursor:pointer;}
.date-hidden{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;}
.field{position:relative;}
.settings-row.between{display:flex;justify-content:space-between;align-items:center;}
.switch{position:relative;width:46px;height:27px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;inset:0;background:var(--fill2);border-radius:27px;transition:.2s;}
.slider:before{content:"";position:absolute;height:23px;width:23px;left:3px;bottom:2px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
input:checked + .slider{background:var(--green);}
input:checked + .slider:before{transform:translateX(-19px);}
</style>

<div id="lock-screen"></div>
<div id="app" class="hidden">

  <!-- ===== TAB: מסמכים ===== -->

    <div style="height:20px;"></div>

  <div class="bottom-wrap"><div class="bottom-inner">
    <div class="tabbar">
      <button class="tab-item active" id="tabbtn-docs" onclick="switchTab('docs')"><span class="tab-icon">📄</span><span class="tab-lbl">מסמכים</span></button>
      <button class="tab-item" id="tabbtn-family" onclick="switchTab('family')"><span class="tab-icon">👨‍👩‍👧</span><span class="tab-lbl">משפחה</span></button>
      <button class="tab-item" id="tabbtn-settings" onclick="switchTab('settings')"><span class="tab-icon">⚙️</span><span class="tab-lbl">הגדרות</span></button>
    </div>
    <button class="fab" id="fab" onclick="onFabClick()">＋</button>
  </div></div>
</div>

<script>
/*************************************************************
 * הצפנה: מפתח אמיתי נגזר מ"קוד ארוך" (PBKDF2 -> AES-GCM).
 * ה"קוד הארוך" לעולם לא נשלח לשרת ולא נשמר בשום מקום.
 * במכשיר: לאחר הזנת הקוד הארוך פעם אחת, ה-master key נעטף
 * (wrap) במפתח שנגזר מה-PIN ונשמר מוצפן ב-localStorage של
 * המכשיר הזה בלבד. כך שבכניסות הבאות מספיק PIN.
 *************************************************************/
const enc = new TextEncoder(), dec = new TextDecoder();
function b64(buf){return btoa(String.fromCharCode(...new Uint8Array(buf)));}
function unb64(str){return Uint8Array.from(atob(str),c=>c.charCodeAt(0)).buffer;}
function randBytes(n){return crypto.getRandomValues(new Uint8Array(n));}

async function deriveKey(secret, saltB64, iterations){
  const salt = unb64(saltB64);
  const base = await crypto.subtle.importKey('raw', enc.encode(secret), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations: iterations||210000, hash:'SHA-256'},
    base, {name:'AES-GCM', length:256}, true, ['encrypt','decrypt','wrapKey','unwrapKey']);
}

async function aesEncryptJSON(key, obj){
  const iv = randBytes(12);
  const data = enc.encode(JSON.stringify(obj));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, data);
  return b64(iv)+'.'+b64(ct);
}
async function aesDecryptJSON(key, payload){
  const [ivB64, ctB64] = payload.split('.');
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv: unb64(ivB64)}, key, unb64(ctB64));
  return JSON.parse(dec.decode(pt));
}
async function aesEncryptText(key, text){
  const iv = randBytes(12);
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, enc.encode(text));
  return b64(iv)+'.'+b64(ct);
}
async function aesDecryptText(key, payload){
  const [ivB64, ctB64] = payload.split('.');
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv: unb64(ivB64)}, key, unb64(ctB64));
  return dec.decode(pt);
}

/* עטיפת master key ע"י מפתח שנגזר מ-PIN, ושמירה מקומית במכשיר */
async function wrapMasterKeyWithPin(masterKey, pin, pinSalt){
  const pinKey = await deriveKey(pin, pinSalt, 150000);
  const iv = randBytes(12);
  const raw = await crypto.subtle.exportKey('raw', masterKey);
  const wrapped = await crypto.subtle.encrypt({name:'AES-GCM', iv}, pinKey, raw);
  return {iv:b64(iv), data:b64(wrapped)};
}
async function unwrapMasterKeyWithPin(wrappedObj, pin, pinSalt){
  const pinKey = await deriveKey(pin, pinSalt, 150000);
  const raw = await crypto.subtle.decrypt({name:'AES-GCM', iv: unb64(wrappedObj.iv)}, pinKey, unb64(wrappedObj.data));
  return crypto.subtle.importKey('raw', raw, 'AES-GCM', true, ['encrypt','decrypt']);
}

/* ---------- Face ID / טביעת אצבע (WebAuthn + PRF) ----------
   PRF (Pseudo-Random Function) היא הרחבה של WebAuthn שמאפשרת לגזור
   מפתח סודי אמיתי מתוך האימות הביומטרי (ולא רק "לאשר נוכחות").
   המפתח הזה משמש לעטוף (wrap) את ה-master key, בדיוק כמו ה-PIN,
   ונשמר מקומית במכשיר בלבד. נתמך ב-Safari/iOS מגרסה 18 ומעלה,
   ודורש כתובת HTTPS עצמאית (לא iframe) - בדיוק המצב אחרי המעבר. */
async function biometricAvailable(){
  if(!(window.PublicKeyCredential && navigator.credentials)) return false;
  try{
    if(PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable){
      return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    }
  }catch(e){}
  return false;
}
async function enrollBiometric(){
  if(!MASTER_KEY) throw new Error('יש להיות מחוברים כדי להפעיל Face ID');
  let cred;
  try{
    cred = await navigator.credentials.create({
      publicKey:{
        challenge: randBytes(32),
        rp: { name: 'מסמכי משפחה' },
        user: { id: randBytes(16), name: 'user', displayName: 'משתמש' },
        pubKeyCredParams: [{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
        authenticatorSelection: { authenticatorAttachment:'platform', userVerification:'required', residentKey:'required' },
        timeout: 60000,
        extensions: { prf: {} }
      }
    });
  }catch(e){ throw new Error('הפעולה בוטלה או שהמכשיר לא תומך'); }

  const prfSalt = randBytes(32);
  const assertion = await navigator.credentials.get({
    publicKey: {
      challenge: randBytes(32),
      allowCredentials: [{ id: cred.rawId, type:'public-key' }],
      userVerification:'required',
      extensions: { prf: { eval: { first: prfSalt } } }
    }
  });
  const extResults = assertion.getClientExtensionResults();
  if(!extResults.prf || !extResults.prf.results || !extResults.prf.results.first){
    throw new Error('המכשיר הזה לא תומך בשמירת מפתח מוצפן דרך Face ID. אפשר להמשיך עם PIN.');
  }
  const keyMaterial = await crypto.subtle.digest('SHA-256', extResults.prf.results.first);
  const bioKey = await crypto.subtle.importKey('raw', keyMaterial, 'AES-GCM', false, ['encrypt']);
  const iv = randBytes(12);
  const raw = await crypto.subtle.exportKey('raw', MASTER_KEY);
  const wrapped = await crypto.subtle.encrypt({name:'AES-GCM', iv}, bioKey, raw);

  const device = localGet('mdocs_device') || {};
  device.bio = { credId: b64(cred.rawId), prfSalt: b64(prfSalt), wrapped: { iv: b64(iv), data: b64(wrapped) } };
  localSet('mdocs_device', device);
}
async function unlockWithBiometric(bio){
  const assertion = await navigator.credentials.get({
    publicKey: {
      challenge: randBytes(32),
      allowCredentials: [{ id: unb64(bio.credId), type:'public-key' }],
      userVerification: 'required',
      extensions: { prf: { eval: { first: unb64(bio.prfSalt) } } }
    }
  });
  const extResults = assertion.getClientExtensionResults();
  if(!extResults.prf || !extResults.prf.results || !extResults.prf.results.first) throw new Error('שגיאת Face ID');
  const keyMaterial = await crypto.subtle.digest('SHA-256', extResults.prf.results.first);
  const bioKey = await crypto.subtle.importKey('raw', keyMaterial, 'AES-GCM', false, ['decrypt']);
  const raw = await crypto.subtle.decrypt({name:'AES-GCM', iv: unb64(bio.wrapped.iv)}, bioKey, unb64(bio.wrapped.data));
  MASTER_KEY = await crypto.subtle.importKey('raw', raw, 'AES-GCM', true, ['encrypt','decrypt']);
}

/* ---- שדה תאריך כפול: הקלדה ידנית (DD/MM/YYYY) + כפתור לוח שנה ---- */
function isoToDMY(iso){ if(!iso) return ''; const p=iso.split('-'); if(p.length!==3) return ''; return p[2]+'/'+p[1]+'/'+p[0]; }
function dmyToISO(str){
  const m = (str||'').trim().match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{4})$/);
  if(!m) return '';
  const dd=('0'+m[1]).slice(-2), mm=('0'+m[2]).slice(-2);
  return m[3]+'-'+mm+'-'+dd;
}
function formatDateTyping(v){
  v = v.replace(/[^\d]/g,'').slice(0,8);
  if(v.length>4) return v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4);
  if(v.length>2) return v.slice(0,2)+'/'+v.slice(2);
  return v;
}

    <button type="button" class="date-cal-btn" onclick="openNativeDate('${id}')">📅</button>
  </div>
  <input type="date" id="${id}_native" class="date-hidden" value="${iso||''}">`;
}

  });

}

  try{
    const masterSalt = b64(randBytes(16));

async function doDeviceRecovery(){
  const lc = document.getElementById('recLongCode').value;
  const pin = document.getElementById('recPin').value;
  const err = document.getElementById('recError');
  const btn = document.getElementById('recBtn');
  err.textContent = '';
  if(!/^[0-9]{6,8}$/.test(pin)){err.textContent='PIN חייב להיות 6-8 ספרות (מינימום 6, לביטחון)'; return;}
  setBtnLoading(btn, 'בודק את הקוד...');
  try{
    // אנחנו לא יודעים את ה-salt המקורי מבלי לטעון קודם את הנתונים -
    // הנתונים המוצפנים בשרת כוללים את ה-salt כשדה גלוי בתחילת הקובץ.
    const resp = await gasCall('loadEncryptedData');
    if(!resp.exists){ clearBtnLoading(btn); err.textContent='לא נמצאו נתונים בשרת עדיין'; return; }
    const wrapper = JSON.parse(resp.payload);
    const testKey = await deriveKey(lc, wrapper.salt, 210000);
    DB = await aesDecryptJSON(testKey, wrapper.payload); // אם הקוד שגוי - תיזרק שגיאה כאן
    MASTER_KEY = testKey;
    const pinSalt = b64(randBytes(16));
    const wrapped = await wrapMasterKeyWithPin(MASTER_KEY, pin, pinSalt);
    localSet('mdocs_device', {wrapped, pinSalt, masterSalt: wrapper.salt});
    unlockApp();
  }catch(e){
    clearBtnLoading(btn);
    err.textContent = 'קוד ארוך שגוי, או שאין עדיין נתונים בשרת';
  }
}

// כתובת ה-Web App של גוגל אפס-סקריפט (מודבקת אחרי הפריסה - ר' הוראות בקובץ apps-script/Code.gs)
var APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw22MfFVwbsQQwgpggdTUliybqYWB_eSvSPkIjSohGCAvZM48-GmHsuhVhsj_4rPxUQ_w/exec";

function gasCall(fnName, ...args){
  return new Promise((resolve,reject)=>{
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      // חשוב: text/plain כדי למנוע preflight OPTIONS - אפס-סקריפט לא תומך בו
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ fn: fnName, args: args })
    })
    .then(function(r){ return r.json(); })
    .then(function(res){
      if(res && res.__error){ reject(new Error(res.__error)); }
      else { resolve(res); }
    })
    .catch(reject);
  });
}

async function persistDB(){
  const wrapper = { salt: DB.salt, payload: await aesEncryptJSON(MASTER_KEY, DB) };
  const idx = buildExpiryIndex();
  const res = await gasCall('saveEncryptedDataAndIndex', JSON.stringify(wrapper), idx, DB._serverTimestamp || null);
  if(res && res.conflict){
    alert('הנתונים עודכנו בינתיים ממכשיר אחר. כדי לא לדרוס שינויים, האפליקציה תטען מחדש את הנתונים העדכניים ביותר. השינוי האחרון שביצעת כאן לא יישמר - יש לבצע אותו שוב.');
    await loadDB();
    renderAll();
    if(!document.getElementById('tab-settings').classList.contains('hidden')) renderSettingsTab();
    if(!document.getElementById('tab-family').classList.contains('hidden')) renderFamilyTab();
    throw new Error('conflict');
  }
  if(res && res.updated) DB._serverTimestamp = res.updated;
}
function buildExpiryIndex(){
  return DB.documents.filter(d=>!d.archived && d.expiryDate).map(d=>{
    const fam = DB.family.find(f=>f.id===d.familyId);
    return {
      id: d.id,
      firstName: fam ? (fam.nameHe||'').split(' ')[0] : '',
      docType: d.type,
      country: d.country || '',
      expiryDate: d.expiryDate,
      reminders: d.reminders || [],
      sentDays: d.sentDays || []
    };
  });
}
async function loadDB(){
  const resp = await gasCall('loadEncryptedData');
  if(!resp.exists){ DB = {family:[], documents:[], countries:[], relationTypes: DEFAULT_RELATIONS.slice(), salt: b64(randBytes(16))}; DB._serverTimestamp = null; return; }
  const wrapper = JSON.parse(resp.payload);
  DB = await aesDecryptJSON(MASTER_KEY, wrapper.payload);
  DB.relationTypes = DB.relationTypes && DB.relationTypes.length ? DB.relationTypes : DEFAULT_RELATIONS.slice();
  DB.salt = wrapper.salt;
  DB._serverTimestamp = resp.updated;
}

async function persistExpiryIndex(){
  const idx = DB.documents.filter(d=>!d.archived && d.expiryDate).map(d=>{
    const fam = DB.family.find(f=>f.id===d.familyId);
    return {
      id: d.id,
      firstName: fam ? (fam.nameHe||'').split(' ')[0] : '',
      docType: d.type,
      expiryDate: d.expiryDate,
      reminders: d.reminders || [],
      sentDays: d.sentDays || []
    };
  });
  await gasCall('saveExpiryIndex', idx);
}

/*************************************************************
 * חישוב סטטוס תפוגה
 *************************************************************/
function daysUntil(dateStr){
  if(!dateStr) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr);
  return Math.round((d-today)/86400000);
}
function statusOf(doc){
  if(doc.archived) return 'expired';
  const days = daysUntil(doc.expiryDate);
  if(days===null) return 'expired'; // אפור = ללא תאריך
  if(days<30) return 'critical';
  if(days<180) return 'warning';
  return 'ok';
}
function formatDDMMYYYY(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr);
  const dd=('0'+d.getDate()).slice(-2), mm=('0'+(d.getMonth()+1)).slice(-2);
  return dd+'/'+mm+'/'+d.getFullYear();
}
function daysLabel(days){
  if(days===null) return 'ללא תאריך';
  if(days<0) return 'פג תוקף';
  if(days===0) return 'פג היום';
  return 'נותרו ' + humanizeDuration(days);
}
// הופך מספר ימים למחרוזת ידידותית: "X ימים" / "X חודשים" / "שנה" / "שנה וחודשיים" וכו'
function humanizeDuration(days){
  if(days < 60) return days + ' ימים';
  const totalMonths = Math.round(days / 30);
  const years = Math.floor(totalMonths / 12);
  const months = totalMonths % 12;
  if(years === 0) return months + ' חודשים';
  const yearPart = years === 1 ? 'שנה' : years + ' שנים';
  if(months === 0) return yearPart;
  const monthPart = months === 1 ? 'חודש' : (months === 2 ? 'חודשיים' : months + ' חודשים');
  return yearPart + ' ו' + monthPart;
}

function computeCounts(list){
  const c = {red:0,orange:0,green:0,gray:0};
  list.forEach(d=>{
    const days = daysUntil(d.expiryDate);
    if(days===null) c.gray++;
    else if(days<30) c.red++;
    else if(days<180) c.orange++;
    else c.green++;
  });
  return c;
}

function matchesFilter(d){
  if(!currentFilter.archive && d.archived) return false;
  if(currentFilter.archive && !d.archived) return false;
  if(currentFilter.status!=='all'){
    const st = statusOf(d);
    if(currentFilter.status==='red' && st!=='critical') return false;
    if(currentFilter.status==='orange' && st!=='warning') return false;
    if(currentFilter.status==='green' && st!=='ok') return false;
  }
  if(currentFilter.types.length && !currentFilter.types.includes(d.type)) return false;
  if(currentFilter.countries.length && !currentFilter.countries.includes(d.country)) return false;
  if(currentFilter.people.length && !currentFilter.people.includes(d.familyId)) return false;
  const q = (document.getElementById('searchInput').value||'').trim().toLowerCase();
  if(q){
    const fam = DB.family.find(f=>f.id===d.familyId);
    const hay = [fam?fam.nameHe:'', fam?fam.nameEn:'', docTypeMeta(d.type).label, d.country, d.docNumber, d.notes].join(' ').toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}

function renderDocsTab(){
  const nonArchived = DB.documents.filter(d=>!d.archived);
  const counts = computeCounts(nonArchived);
  document.getElementById('pills').innerHTML = `
    <div class="pill r"><div class="pill-num r">${counts.red}</div><div class="pill-lbl">דחוף</div></div>
    <div class="pill o"><div class="pill-num o">${counts.orange}</div><div class="pill-lbl">בקרוב</div></div>
    <div class="pill g"><div class="pill-num g">${counts.green}</div><div class="pill-lbl">תקין</div></div>
    <div class="pill"><div class="pill-num gr">${counts.gray}</div><div class="pill-lbl">ללא תפוגה</div></div>`;

  document.getElementById('statusChips').innerHTML = ['all','red','orange','green'].map(s=>{
    const labels={all:'הכל',red:'דחוף 🔴',orange:'בקרוב 🟡',green:'תקין 🟢'};
    return `<button class="chip ${currentFilter.status===s?'on':''}" onclick="setStatusFilter('${s}')">${labels[s]}</button>`;
  }).join('');

  document.getElementById('clearFiltersBtn').classList.toggle('hidden',
    currentFilter.status==='all' && !currentFilter.types.length && !currentFilter.countries.length && !currentFilter.people.length && !currentFilter.archive && !document.getElementById('searchInput').value);

  let list = DB.documents.filter(matchesFilter);
  list.sort((a,b)=>{
    const da = a.expiryDate ? new Date(a.expiryDate).getTime() : Infinity;
    const db_ = b.expiryDate ? new Date(b.expiryDate).getTime() : Infinity;
    return da-db_;
  });

  const container = document.getElementById('docList');
  if(!list.length){ container.innerHTML = '<div class="empty-state">אין מסמכים להצגה</div>'; return; }
  container.innerHTML = list.map(d=>{
    const fam = DB.family.find(f=>f.id===d.familyId);
    const meta = docTypeMeta(d.type);
    const days = daysUntil(d.expiryDate);
    const st = statusOf(d);
    const stripClass = st==='ok'?'ok':st==='warning'?'warning':st==='critical'?'critical':'expired';
    const badgeClass = st==='ok'?'b-green':st==='warning'?'b-orange':st==='critical'?'b-red':'b-gray';
    return `<div class="doc-card" onclick="openDocDetail('${d.id}')">
      <div class="strip ${stripClass}"></div>
      <div class="doc-body">
        ${docIconHtml(d.type)}
        <div class="doc-info">
          <div class="doc-name">${fam?fam.nameHe:'?'} ${d.archived?'· בארכיון':''}</div>
          <div class="doc-type">${meta.label}${d.country?' · '+d.country:''}${d.hasImage?' · 📎':''}</div>
        </div>
        <div class="badge ${badgeClass}">${daysLabel(days)}</div>
      </div>
    </div>`;
  }).join('');
}

/* דחיסת תמונה בצד הלקוח לפני הצפנה - תמונת מצלמה גולמית יכולה לשקול 10MB+
   ולגרום לקריסת זיכרון בדפדפן הנייד. מצמצמים למקסימום 1400px ודוחסים ל-JPEG */
function resizeImageForUpload(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = ()=>{ img.onload = ()=>{
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function saveDocForm(){
  if(window._savingDoc) return;
  window._savingDoc = true;
  try{
  const familyId = document.getElementById('docFamily').value;
  if(!familyId){ toast('יש להוסיף קודם בן משפחה'); window._savingDoc=false; return; }
  const reminders = REMINDER_OPTIONS.filter(r=>document.getElementById('rem_'+r.days).checked).map(r=>r.days);
  let doc = editingDocId ? DB.documents.find(x=>x.id===editingDocId) : { id: 'd_'+Date.now()+'_'+Math.random().toString(36).slice(2,8), archived:false };
  doc.familyId = familyId;
  doc.type = document.getElementById('docType').value;
  doc.docNumber = document.getElementById('docNumber').value;
  doc.country = document.getElementById('docCountry').value;
  doc.issueDate = getDateFieldISO('docIssue');
  doc.expiryDate = getDateFieldISO('docExpiry');
  doc.notes = document.getElementById('docNotes').value;
  doc.reminders = reminders;
  doc.sentDays = doc.sentDays || [];

  if(!DB.countries.includes(doc.country) && doc.country) DB.countries.push(doc.country);
  if(!editingDocId) DB.documents.push(doc);

  // עדכון מיידי של המסך - לא מחכים לשרת כדי שהאפליקציה תרגיש מהירה
  closeSheet(); renderDocsTab();
  toast('שומר...');

  try{
    if(pendingImageBase64){
      const encImg = await aesEncryptText(MASTER_KEY, pendingImageBase64);
      const res = await gasCall('saveEncryptedImage', doc.imageFileId||null, encImg);
      doc.imageFileId = res.fileId;
      doc.imageMime = pendingImageMime;
      doc.hasImage = true;
    }
    await persistDB();
    toast('נשמר בהצלחה ✓');
  }catch(e){
    if(!e || e.message!=='conflict') toast('שגיאה בשמירה - בדקו חיבור לאינטרנט ונסו שוב');
  }
  }finally{ window._savingDoc = false; }
}

function toggleArchiveDoc(id){
  const d = DB.documents.find(x=>x.id===id);
  d.archived = !d.archived;
  closeSheet(); renderDocsTab(); toast(d.archived?'הועבר לארכיון':'שוחזר מהארכיון');
  persistDB().catch(e=>{ if(!e || e.message!=='conflict') toast('שגיאה בשמירה'); });
}
async function deleteDocConfirm(id){
  if(!confirm('למחוק את המסמך לצמיתות?')) return;
  const d = DB.documents.find(x=>x.id===id);
  if(d.imageFileId){
    try{ await gasCall('deleteEncryptedImage', d.imageFileId); }
    catch(e){ console.error('image delete failed', e); }
  }
  DB.documents = DB.documents.filter(x=>x.id!==id);
  closeSheet(); renderDocsTab(); toast('נמחק');
  persistDB().catch(e=>{ if(!e || e.message!=='conflict') toast('שגיאה בשמירה'); });
}

}
function escAttr(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/\n/g,'&#10;'); }
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast('הועתק ✓')).catch(()=>copyFallback(text));
  } else { copyFallback(text); }
}
function copyFallback(text){
  const ta = document.createElement('textarea'); ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); toast('הועתק ✓'); }catch(e){ toast('לא ניתן להעתיק'); }
  ta.remove();
}
document.addEventListener('click', e=>{
  if(e.target.classList && e.target.classList.contains('copy-btn')){
    copyText(e.target.getAttribute('data-copy'));
  }
});

    return `<div class="fam-card" onclick="openFamilyDetail('${f.id}')">
      <div class="av">${initials}</div>
      <div style="flex:1;"><div class="fam-name">${f.nameHe}</div><div class="fam-rel">${f.relation} · ${count} מסמכים</div></div>
    </div>`;
  }).join('');
}

function openFamilyForm(famId){
  editingFamId = famId;
  const f = famId ? DB.family.find(x=>x.id===famId) : null;
  const relations = DB.relationTypes && DB.relationTypes.length ? DB.relationTypes : DEFAULT_RELATIONS;
  const defaultRelation = f ? f.relation : 'ילד/ה';
  const relOptions = relations.includes(defaultRelation) ? relations : [defaultRelation, ...relations];
  openSheet(`
    <div class="sheet-header"><h2>${f?'עריכת בן משפחה':'בן משפחה חדש'}</h2><button class="sheet-close" onclick="closeSheet()">✕</button></div>
    <div class="field"><label class="field-label">שם בעברית</label><input type="text" id="famNameHe" value="${f?f.nameHe:''}"></div>
    <div class="field"><label class="field-label">שם באנגלית (כמו בדרכון)</label><input type="text" id="famNameEn" value="${f?f.nameEn||'':''}"></div>
    <div class="field"><label class="field-label">תאריך לידה</label>${dateFieldHTML('famBirth', f?f.birthDate:'')}</div>
    <div class="field"><label class="field-label">קשר משפחתי</label>
      <select id="famRelation">${relOptions.map(r=>`<option ${r===defaultRelation?'selected':''}>${r}</option>`).join('')}</select></div>
    <button class="btn btn-blue" onclick="saveFamilyForm()">שמירה</button>
    ${f?`<button class="btn btn-red" onclick="deleteFamilyConfirm('${f.id}')">מחיקת בן משפחה</button>`:''}
  `);
  initDateField('famBirth');
}
async function saveFamilyForm(){
  if(window._savingFam) return;
  window._savingFam = true;
  const nameHe = document.getElementById('famNameHe').value.trim();
  if(!nameHe){ toast('יש להזין שם'); window._savingFam=false; return; }
  let f = editingFamId ? DB.family.find(x=>x.id===editingFamId) : { id: 'f_'+Date.now()+'_'+Math.random().toString(36).slice(2,8) };
  f.nameHe = nameHe;
  f.nameEn = document.getElementById('famNameEn').value.trim();
  f.birthDate = getDateFieldISO('famBirth');
  f.relation = document.getElementById('famRelation').value;
  const isNew = !editingFamId;
  if(isNew) DB.family.push(f);
  closeSheet(); renderFamilyTab(); toast('נשמר בהצלחה');
  persistDB().catch(e=>{ if(!e || e.message!=='conflict') toast('שגיאה בשמירה, בדקו חיבור לאינטרנט'); }).finally(()=>{ window._savingFam=false; });
}
async function deleteFamilyConfirm(id){
  if(!confirm('מחיקת בן המשפחה תמחק גם את כל המסמכים שלו. להמשיך?')) return;
  const docsToDelete = DB.documents.filter(d=>d.familyId===id);
  await Promise.all(docsToDelete.map(d=>{
    if(!d.imageFileId) return Promise.resolve();
    return gasCall('deleteEncryptedImage', d.imageFileId).catch(e=>console.error('image delete failed', e));
  }));
  DB.documents = DB.documents.filter(d=>d.familyId!==id);
  DB.family = DB.family.filter(f=>f.id!==id);
  closeSheet(); renderFamilyTab(); toast('נמחק');
  persistDB().catch(e=>{ if(!e || e.message!=='conflict') toast('שגיאה בשמירה'); });
}
function openFamilyDetail(id){
  const f = DB.family.find(x=>x.id===id);
  const docs = DB.documents.filter(d=>d.familyId===id && !d.archived);
  openSheet(`
    <div class="sheet-header"><h2>${f.nameHe}</h2><button class="sheet-close" onclick="closeSheet()">✕</button></div>
    <div style="font-size:14px;color:var(--label3);margin-bottom:10px;">${f.relation} ${f.nameEn?'· '+f.nameEn:''} ${f.birthDate?'· נולד/ה '+formatDDMMYYYY(f.birthDate):''}</div>
    <button class="btn btn-blue" onclick="closeSheet();openDocForm(null);setTimeout(()=>document.getElementById('docFamily').value='${id}',50);">➕ הוספת מסמך</button>
    <button class="btn btn-gray" onclick="openFamilyForm('${id}')">✏️ עריכת פרטים</button>
    <div style="margin-top:10px;">
    ${docs.map(d=>{
      const meta = docTypeMeta(d.type);
      return `<div class="doc-card" onclick="closeSheet();openDocDetail('${d.id}')"><div class="doc-body">${docIconHtml(d.type)}<div class="doc-info"><div class="doc-name">${meta.label}</div><div class="doc-type">${daysLabel(daysUntil(d.expiryDate))}</div></div></div></div>`;
    }).join('') || '<div class="empty-state">אין מסמכים</div>'}
    </div>
  `);
}

/*************************************************************
 * הגדרות
 *************************************************************/
async function renderSettingsTab(){
  const email = await gasCall('getReminderEmail');
  document.getElementById('reminderEmailInput').value = email || '';
  renderRelationTypesSettings();
  renderCountriesSettings();
  renderBiometricRow();
}
async function renderBiometricRow(){
  const el = document.getElementById('biometricRow');
  const device = localGet('mdocs_device');
  const enabled = !!(device && device.bio);
  if(enabled){
    el.innerHTML = `
      <div style="width:100%;">
        <label>Face ID / טביעת אצבע</label>
        <div style="font-size:12px;color:var(--green);margin-top:4px;">✅ מופעל במכשיר הזה</div>
        <button class="btn btn-gray" style="margin-top:8px;" onclick="disableBiometric()">כיבוי במכשיר זה</button>
      </div>`;
    return;
  }
  const supported = await biometricAvailable();
  if(supported){
    el.innerHTML = `
      <div style="width:100%;">
        <label>Face ID / טביעת אצבע</label>
        <div style="font-size:12px;color:var(--label3);margin-top:4px;line-height:1.6;">אפשר לפתוח את האפליקציה עם Face ID/טביעת אצבע במקום PIN, במכשיר הזה בלבד.</div>
        <button class="btn btn-blue" style="margin-top:8px;" onclick="doEnrollBiometric()">הפעלת Face ID</button>
      </div>`;
  } else {
    el.innerHTML = `
      <div style="width:100%;">
        <label style="color:var(--label3);">Face ID / טביעת אצבע</label>
        <div style="font-size:12px;color:var(--label3);margin-top:4px;line-height:1.6;">
          לא זוהה זיהוי ביומטרי נתמך במכשיר/דפדפן הזה כרגע. ודאו שה-Face ID מופעל בהגדרות האייפון, ושאתם נכנסים דרך הכתובת העצמאית (לא מתוך Google). PIN הוא הפתרון הבטוח בכל מקרה.
        </div>
      </div>`;
  }
}
function renderRelationTypesSettings(){
  const el = document.getElementById('relationTypesGroup');
  const rels = DB.relationTypes && DB.relationTypes.length ? DB.relationTypes : DEFAULT_RELATIONS;
  el.innerHTML = rels.map(r=>`<div class="settings-row"><label>${r}</label>
    ${DEFAULT_RELATIONS.includes(r)?'':`<button onclick="removeRelationType('${r}')" style="background:none;border:none;color:var(--red);">מחק</button>`}</div>`).join('')
    + `<div class="settings-row"><input type="text" id="newRelationInput" placeholder="קשר חדש, למשל: בן/בת זוג"><button onclick="addRelationType()" style="background:none;border:none;color:var(--blue);font-weight:600;">הוסף</button></div>`;
}
async function addRelationType(){
  const v = document.getElementById('newRelationInput').value.trim();
  if(!v) return;
  DB.relationTypes = DB.relationTypes||DEFAULT_RELATIONS.slice();
  if(!DB.relationTypes.includes(v)) DB.relationTypes.push(v);
  await persistDB(); renderRelationTypesSettings();
}
async function removeRelationType(r){
  DB.relationTypes = (DB.relationTypes||[]).filter(x=>x!==r);
  await persistDB(); renderRelationTypesSettings();
}
function renderCountriesSettings(){
  const el = document.getElementById('countriesGroup');
  el.innerHTML = DB.countries.map(c=>`<div class="settings-row"><label>${c}</label>
    <button onclick="removeCountry('${c}')" style="background:none;border:none;color:var(--red);">מחק</button></div>`).join('')
    + `<div class="settings-row"><input type="text" id="newCountryInput" placeholder="מדינה חדשה"><button onclick="addCountry()" style="background:none;border:none;color:var(--blue);font-weight:600;">הוסף</button></div>`;
}
async function addCountry(){
  const v = document.getElementById('newCountryInput').value.trim();
  if(!v) return;
  if(!DB.countries.includes(v)) DB.countries.push(v);
  await persistDB(); renderCountriesSettings();
}
async function removeCountry(c){
  DB.countries = DB.countries.filter(x=>x!==c);
  await persistDB(); renderCountriesSettings();
}
async function saveReminderEmail(){
  const v = document.getElementById('reminderEmailInput').value.trim();
  await gasCall('setReminderEmail', v);
  await gasCall('ensureDailyTrigger');
  toast('הכתובת נשמרה');
}
async function sendStatusNowClick(){
  toast('שולח מייל...');
  const res = await gasCall('sendStatusNow');
  toast(res.ok ? 'המייל נשלח!' : ('שגיאה: '+res.error));
}
function openChangePin(){
  openSheet(`
    <div class="sheet-header"><h2>שינוי קוד PIN</h2><button class="sheet-close" onclick="closeSheet()">✕</button></div>
    <div class="field"><label class="field-label">PIN חדש (6-8 ספרות)</label><input type="password" id="newPinInput" inputmode="numeric"></div>
    <button class="btn btn-blue" onclick="doChangePin()">שמירה</button>
  `);
}
async function doChangePin(){
  const pin = document.getElementById('newPinInput').value;
  if(!/^[0-9]{6,8}$/.test(pin)){ toast('PIN חייב להיות 6-8 ספרות (מינימום 6, לביטחון)'); return; }
  const device = localGet('mdocs_device');
  const pinSalt = b64(randBytes(16));
  const wrapped = await wrapMasterKeyWithPin(MASTER_KEY, pin, pinSalt);
  localSet('mdocs_device', {wrapped, pinSalt, masterSalt: device.masterSalt, bio: device.bio});
  closeSheet(); toast('קוד PIN עודכן');
}
async function exportBackupClick(){
  const json = await gasCall('exportBackup');
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'mishpacha-docs-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  toast('קובץ הגיבוי הורד (עדיין מוצפן, בטוח לשמור בכל מקום)');
}
document.addEventListener('change', async e=>{
  if(e.target.id==='importFile'){
    const file = e.target.files[0];
    if(!file) return;
    let text;
    try{ text = await file.text(); }
    catch(err){ toast('לא ניתן לקרוא את הקובץ'); e.target.value=''; return; }

    // ולידציה: ננסה לפענח את הגיבוי עם המפתח הנוכחי (בזיכרון) לפני שליחה לשרת.
    // אם הגיבוי הוצפן עם קוד ארוך אחר, הפענוח ייכשל כאן - ונעצור, כדי לא "לנעול" את האפליקציה
    let backupObj, wrapper;
    try{
      backupObj = JSON.parse(text);
      wrapper = JSON.parse(backupObj.data);
      await aesDecryptJSON(MASTER_KEY, wrapper.payload); // רק בדיקה - הערך לא בשימוש
    }catch(err){
      toast('קובץ הגיבוי הוצפן עם קוד ארוך שונה מזה שבשימוש כרגע - לא ניתן לשחזר. יש להתחבר קודם עם הקוד הארוך שבו הוצפן הגיבוי הזה.');
      e.target.value=''; return;
    }

    if(!confirm('שחזור מגיבוי ידרוס את הנתונים הנוכחיים בשרת. להמשיך?')) { e.target.value=''; return; }
    try{
      await gasCall('importBackup', text);
      await loadDB();
      renderAll();
      toast('השחזור הושלם ✓');
    }catch(err){
      toast('שגיאה בשחזור - נסו שוב');
    }
    e.target.value='';
  }
});

/*************************************************************
 * Sheet / Toast utilities
 *************************************************************/
function openSheet(html){
  document.getElementById('sheetRoot').innerHTML = `<div class="sheet-overlay" onclick="if(event.target===this)closeSheet()"><div class="sheet">${html}</div></div>`;
}
function closeSheet(){ document.getElementById('sheetRoot').innerHTML=''; }
function toast(msg){
  const t = document.createElement('div'); t.className='toast'; t.textContent = msg;
  document.getElementById('toastRoot').appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

/*************************************************************
 * Safari ITP / Storage Access API
 * ------------------------------------------------------------
 * Google Apps Script מגיש את האפליקציה בתוך iframe (בתוך
 * script.google.com / googleusercontent.com). ITP של ספארי
 * חוסם/מוחק localStorage בהקשר כזה, ולכן המכשיר "שוכח" את
 * המכשיר המאושר. מנסים לבקש הרשאה מפורשת עם ז'סטה של המשתמש.
 *************************************************************/
async function ensureStorageAccessThenInit(){
  if(document.hasStorageAccess && document.requestStorageAccess){
    try{
      const has = await document.hasStorageAccess();
      if(!has){ showStorageAccessPrompt(); return; }
    }catch(e){}
  }
  initLockScreen();
}
function showStorageAccessPrompt(){
  const el = document.getElementById('lock-screen');
  el.innerHTML = `
    <div class="lock-title">כמעט שם 👋</div>
    <div class="lock-sub" style="margin-bottom:20px;max-width:300px;">כדי שהמכשיר הזה "יזכר" (ולא יבקש בכל פעם את הקוד הארוך), Safari דורש אישור חד-פעמי לשמירת מידע באפליקציה. לחצו על הכפתור ואשרו בחלון שייפתח.</div>
    <button class="btn btn-blue" style="max-width:300px;" onclick="grantStorageAccess()">אפשרו שמירת נתונים במכשיר</button>
    <button class="btn btn-gray" style="max-width:300px;" onclick="initLockScreen()">דלגו (יתכן ויבקש קוד שוב בפעם הבאה)</button>
  `;
}
async function grantStorageAccess(){
  try{ await document.requestStorageAccess(); }catch(e){ /* נדחה - ממשיכים בכל זאת */ }
  initLockScreen();
}

/*************************************************************
 * התחלה
 *************************************************************/
ensureStorageAccessThenInit();
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
</script>
